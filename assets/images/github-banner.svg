<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">EventPro Tickets Plus for WooCommerce — GitHub Banner</title>
  <desc id="desc">A modern dark GitHub banner for a WooCommerce event management and ticketing plugin.</desc>

  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1180" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220" />
      <stop offset="0.5" stop-color="#111B31" />
      <stop offset="1" stop-color="#0B1627" />
    </linearGradient>

    <linearGradient id="gridGlow" x1="320" y1="80" x2="1160" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.22" />
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.18" />
    </linearGradient>

    <linearGradient id="accent" x1="182" y1="112" x2="1060" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" />
      <stop offset="1" stop-color="#14B8A6" />
    </linearGradient>

    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172554" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>

    <filter id="softShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#020617" flood-opacity="0.35" />
    </filter>

    <filter id="cardShadow" x="720" y="72" width="420" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.32" />
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" />
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="32" fill="#08111F" />
  <g filter="url(#softShadow)">
    <rect x="24" y="24" width="1232" height="592" rx="28" fill="url(#bg)" />
    <rect x="24.5" y="24.5" width="1231" height="591" rx="27.5" stroke="#1E293B" />
  </g>

  <rect x="24" y="24" width="1232" height="592" rx="28" fill="url(#grid)" />

  <circle cx="1088" cy="118" r="168" fill="#2563EB" opacity="0.10" />
  <circle cx="1018" cy="206" r="152" fill="#14B8A6" opacity="0.09" />
  <circle cx="1160" cy="246" r="126" fill="#60A5FA" opacity="0.10" />
  <circle cx="182" cy="546" r="168" fill="#14B8A6" opacity="0.08" />

  <path d="M678 80C792 122 862 180 970 244C1056 294 1122 342 1218 362" stroke="url(#gridGlow)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M672 126C760 164 858 224 942 290C994 330 1046 356 1124 384" stroke="url(#gridGlow)" stroke-width="1.8" stroke-linecap="round" opacity="0.75" />

  <rect x="86" y="80" width="148" height="36" rx="18" fill="url(#pill)" />
  <circle cx="110" cy="98" r="5" fill="#22C55E" />
  <text x="128" y="103" fill="#DCE9FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">GitHub Ready</text>

  <rect x="248" y="80" width="150" height="36" rx="18" fill="#0F1A2E" stroke="#22314D" />
  <text x="323" y="103" text-anchor="middle" fill="#B8C7DC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">WooCommerce</text>

  <rect x="412" y="80" width="122" height="36" rx="18" fill="#0F1A2E" stroke="#22314D" />
  <text x="473" y="103" text-anchor="middle" fill="#B8C7DC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Tickets</text>

  <text x="86" y="166" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="0.16em">WORDPRESS EVENT PLUGIN</text>

  <text x="86" y="242" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800">EventPro Tickets Plus</text>
  <text x="86" y="298" fill="#BFD0E4" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">for WooCommerce</text>

  <text x="86" y="360" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500">Modern event selling, attendee management, PDF ticket delivery,</text>
  <text x="86" y="392" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500">and polished booking flows in one premium WordPress plugin.</text>

  <rect x="86" y="448" width="214" height="56" rx="18" fill="url(#accent)" />
  <text x="193" y="482" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Premium UI Blocks</text>

  <rect x="316" y="448" width="192" height="56" rx="18" fill="#0E172A" stroke="#23314C" />
  <text x="412" y="482" text-anchor="middle" fill="#DCE7F5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Fast Checkout Flow</text>

  <g filter="url(#cardShadow)">
    <rect x="760" y="110" width="338" height="388" rx="28" fill="#0C1528" />
    <rect x="760.5" y="110.5" width="337" height="387" rx="27.5" stroke="#24324B" />
  </g>

  <rect x="790" y="140" width="118" height="30" rx="15" fill="#0D244A" />
  <text x="849" y="160" text-anchor="middle" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="0.08em">DASHBOARD</text>

  <text x="790" y="214" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Sell tickets.</text>
  <text x="790" y="254" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Manage events.</text>
  <text x="790" y="294" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Check in faster.</text>

  <rect x="790" y="334" width="126" height="70" rx="20" fill="#111F37" stroke="#24324B" />
  <text x="812" y="362" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Orders</text>
  <text x="812" y="390" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">1,248</text>

  <rect x="932" y="334" width="136" height="70" rx="20" fill="#0F2220" stroke="#20413D" />
  <text x="954" y="362" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Check-ins</text>
  <text x="949" y="390" fill="#2DD4BF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Live Ready</text>

  <rect x="790" y="424" width="278" height="42" rx="16" fill="#0E172A" stroke="#22314D" />
  <circle cx="814" cy="445" r="6" fill="#22C55E" />
  <text x="832" y="450" fill="#C8D4E4" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">WooCommerce payments</text>

  <g opacity="0.95">
    <rect x="748" y="520" width="122" height="30" rx="15" fill="#0F1A2E" stroke="#22314D" />
    <text x="809" y="540" text-anchor="middle" fill="#B8C7DC" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">PDF Tickets</text>

    <rect x="884" y="520" width="106" height="30" rx="15" fill="#0F1A2E" stroke="#22314D" />
    <text x="937" y="540" text-anchor="middle" fill="#B8C7DC" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Check-in</text>

    <rect x="1004" y="520" width="126" height="30" rx="15" fill="#0F1A2E" stroke="#22314D" />
    <text x="1067" y="540" text-anchor="middle" fill="#B8C7DC" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Event Pages</text>
  </g>
</svg>
